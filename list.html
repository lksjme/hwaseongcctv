<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>CCTV 관제 센터 - 통합 리스트</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        :root { --primary: #1a5276; --bg: #f4f7f9; --border: #dee2e6; --accent: #e67e22; }
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Malgun Gothic', sans-serif; background: var(--bg); display: flex; flex-direction: column; overflow: hidden; }
        
        header { height: 55px; background: var(--primary); color: white; display: flex; align-items: center; justify-content: center; flex-shrink: 0; z-index: 1000; position: relative; }
        header h1 { font-size: 18px; margin: 0; }
        .home-btn { position: absolute; left: 15px; width: 36px; height: 36px; background: rgba(255,255,255,0.15); border-radius: 6px; display: flex; align-items: center; justify-content: center; text-decoration: none; color: white; }

        .main-container { display: flex; flex: 1; overflow: hidden; position: relative; }

        .sidebar { width: 280px; background: white; padding: 15px; border-right: 1px solid var(--border); display: flex; flex-direction: column; gap: 12px; flex-shrink: 0; overflow-y: auto; transition: 0.3s; box-sizing: border-box; }
        .sidebar.hidden { margin-left: -280px; }

        .toggle-btn {
            position: absolute; left: 280px; top: 50%; transform: translateY(-50%);
            width: 20px; height: 50px; background: var(--primary); color: white;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; border-radius: 0 8px 8px 0; z-index: 1001; transition: 0.3s; font-size: 12px;
        }
        .sidebar.hidden + .toggle-btn { left: 0; }

        /* 검색창 그룹 가로 배치 및 버튼 색상 수정 */
        .search-group { display: flex; gap: 6px; margin-bottom: 5px; }
        .search-input { flex: 1; padding: 10px; border: 2px solid var(--border); border-radius: 6px; font-size: 13px; outline: none; min-width: 0; }
        
        .search-btn { 
            padding: 0 15px; 
            background: var(--primary); /* 헤더 색상과 동일 */
            color: white; 
            border: none; 
            border-radius: 6px; 
            cursor: pointer; 
            font-weight: bold; 
            white-space: nowrap; 
            transition: background 0.2s;
        }
        .search-btn:hover {
            background: #154360; /* 마우스 올렸을 때 약간 더 진하게 */
        }

        .filter-tabs { display: flex; gap: 4px; margin-bottom: 5px; }
        .tab-btn { flex: 1; padding: 8px 0; border: 1px solid var(--border); background: #f8f9fa; border-radius: 4px; cursor: pointer; font-size: 12px; font-weight: bold; }
        .tab-btn.active { background: var(--primary); color: white; border-color: var(--primary); }

        .stat-card { 
            background: #f8f9fa; border: 1px solid #ddd; padding: 10px; border-radius: 8px; 
            cursor: pointer; transition: 0.2s; display: flex; justify-content: space-between; align-items: center; font-size: 13px;
        }
        .stat-card:hover { background: #eef2f5; }
        .stat-card.active { background: #d4e6f1; border-color: var(--primary); font-weight: bold; }
        .stat-card .count { font-weight: bold; color: var(--accent); }

        .content-area { flex: 1; display: flex; flex-direction: column; background: white; overflow: hidden; }
        .table-wrapper { flex: 1; overflow: auto; border: 1px solid var(--border); }
        table { border-collapse: collapse; font-size: 13px; white-space: nowrap; width: max-content; }
        thead { position: sticky; top: 0; background: #f8f9fa; z-index: 20; }
        th { padding: 10px 15px; border: 1px solid var(--border); background: #f1f4f7; text-align: left; }
        td { padding: 8px 15px; border: 1px solid #eee; color: #444; }
        tr:nth-child(even) { background: #fafafa; }
        tr:hover { background: #f1f7ff; }

        .filter-select { display: block; width: 100%; margin-top: 5px; font-size: 11px; }
        
        .pagination-bar { height: 45px; border-top: 1px solid var(--border); display: flex; align-items: center; justify-content: center; gap: 15px; background: #fff; flex-shrink: 0; }
        .page-btn { padding: 4px 12px; cursor: pointer; border: 1px solid #ccc; background: #fff; border-radius: 4px; font-size: 12px; }
        /* list.html 스타일 태그 맨 아래 추가 */
@media screen and (max-width: 768px) {
    /* 테이블이 너무 넓으면 가로 스크롤이 생기도록 설정 */
    .table-wrapper {
        overflow-x: auto;
        -webkit-overflow-scrolling: touch;
    }

    table {
        min-width: 600px; /* 테이블이 너무 찌그러지지 않게 최소 너비 유지 */
        font-size: 13px;
    }

    /* 검색창 영역 세로 배치 */
    .search-area {
        display: flex;
        flex-direction: column;
        gap: 10px;
    }

    .search-area input, .search-area button {
        width: 100%;
        height: 45px; /* 터치하기 편하게 높이 키움 */
    }
}
    </style>
</head>
<body>

<header>
    <a href="index.html" class="home-btn">🏠</a>
    <h1>화성특례시 방범CCTV 통합 자산 리스트</h1>
</header>

<div class="main-container">
    <div class="sidebar" id="sidebar">
        <label style="font-weight:bold; font-size:14px; color:var(--primary);">🔍 통합 검색</label>
        <div class="search-group">
            <input type="text" id="searchInput" class="search-input" placeholder="검색어 입력..." onkeypress="if(event.keyCode==13) resetAndFilter()">
            <button class="search-btn" onclick="resetAndFilter()">검색</button>
        </div>

        <label style="font-weight:bold; font-size:14px; color:var(--primary); margin-top:5px;">🚧 준공 구분</label>
        <div class="filter-tabs">
            <button class="tab-btn active" onclick="filterByStatus('전체', this)">전체</button>
            <button class="tab-btn" onclick="filterByStatus('준공', this)">준공</button>
            <button class="tab-btn" onclick="filterByStatus('미준공', this)">미준공</button>
        </div>
        
        <hr style="width:100%; border:0; border-top:1px solid #eee;">
        
        <label style="font-weight:bold; font-size:14px; color:var(--primary);">📍 지역별 현황<카메라수량></label>
        <div id="district-stats" style="display:flex; flex-direction:column; gap:6px;"></div>

        <div id="status-box" style="font-size: 12px; color: #666; margin-top: auto; padding-top: 10px;">데이터 로딩 중...</div>
    </div>

    <div class="toggle-btn" id="toggleBtn" onclick="toggleSidebar()">◀</div>

    <div class="content-area">
        <div class="table-wrapper">
            <table id="dataTable">
                <thead id="tableHead"></thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
        
        <div class="pagination-bar">
            <button class="page-btn" id="prevBtn" onclick="changePage(-1)">이전</button>
            <span id="pageInfo" style="font-size:13px; font-weight:bold;">1 / 1</span>
            <button class="page-btn" id="nextBtn" onclick="changePage(1)">다음</button>
        </div>
    </div>
</div>

<script>
    const SHEET_ID = '1_mVh5xroGTVhL7j8IVxnRufmApBFLAnGYIoqDg5MvAw';
    const GID = '1075339251';
    
    let headers = [];
    let allRows = [];
    let filteredRows = [];
    let selectedDistrict = '전체';
    let selectedStatus = '전체';
    
    let currentPage = 1;
    const rowsPerPage = 1000;

    function toggleSidebar() {
        const sidebar = document.getElementById('sidebar');
        const btn = document.getElementById('toggleBtn');
        sidebar.classList.toggle('hidden');
        btn.innerText = sidebar.classList.contains('hidden') ? "▶" : "◀";
    }

    async function fetchData() {
        const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&gid=${GID}`;
        try {
            const res = await fetch(url);
            const text = await res.text();
            const data = parseCSV(text);
            headers = data[0];
            allRows = data.slice(1);
            
            createFilterHeader();
            applyFilters(); 
        } catch (e) { console.error(e); }
    }

    function parseCSV(csv) {
        return csv.split('\n').filter(r => r.trim() !== "").map(row => 
            row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(cell => cell.replace(/^"(.*)"$/, '$1').trim())
        );
    }

    // 필터링된 기반 데이터로 지역 통계 업데이트 (공사상태/검색어 반영됨)
    function updateDistrictStats(currentBaseData) {
        const idxDistrict = 6; 
        const stats = { '전체': currentBaseData.length };
        currentBaseData.forEach(row => {
            const d = row[idxDistrict] || "미분류";
            stats[d] = (stats[d] || 0) + 1;
        });
        const container = document.getElementById('district-stats');
        container.innerHTML = Object.keys(stats).map(name => `
            <div class="stat-card ${selectedDistrict === name ? 'active' : ''}" onclick="filterByDistrict('${name}')">
                <span>${name}</span><span class="count">${stats[name].toLocaleString()}</span>
            </div>
        `).join('');
    }

    function filterByStatus(status, btn) {
        selectedStatus = status;
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        resetAndFilter();
    }

    function filterByDistrict(name) {
        selectedDistrict = name;
        resetAndFilter();
    }

    function createFilterHeader() {
        const head = document.getElementById('tableHead');
        let html = "<tr>";
        headers.forEach((h, idx) => {
            const uniqueValues = [...new Set(allRows.map(row => row[idx]))].filter(v => v && v !== "-").sort();
            html += `<th>${h}<select class="filter-select" data-index="${idx}" onchange="resetAndFilter()"><option value="">전체</option>${uniqueValues.map(v => `<option value="${v}">${v}</option>`).join('')}</select></th>`;
        });
        head.innerHTML = html + "</tr>";
    }

    function resetAndFilter() {
        currentPage = 1;
        applyFilters();
    }

    function applyFilters() {
        const searchTerm = document.getElementById('searchInput').value.toLowerCase();
        const selects = document.querySelectorAll('.filter-select');
        const activeFilters = Array.from(selects).map(s => ({ index: s.dataset.index, value: s.value })).filter(f => f.value !== "");
        
        const idxStatus = 2;   
        const idxDistrict = 6; 

        // 1. 공사상태 + 검색어 + 열필터로 1차 필터링
        const baseFiltered = allRows.filter(row => {
            const matchesStatus = (selectedStatus === '전체') || (row[idxStatus] === selectedStatus);
            const matchesSearch = row.some(cell => String(cell).toLowerCase().includes(searchTerm));
            const matchesFilters = activeFilters.every(f => row[f.index] === f.value);
            return matchesStatus && matchesSearch && matchesFilters;
        });

        // 2. 1차 결과를 바탕으로 통계 수치 갱신
        updateDistrictStats(baseFiltered);

        // 3. 지역 선택까지 포함하여 최종 데이터 산출
        filteredRows = baseFiltered.filter(row => {
            return (selectedDistrict === '전체') || (row[idxDistrict] === selectedDistrict);
        });

        updateDisplay();
    }

    function updateDisplay() {
        const totalPages = Math.ceil(filteredRows.length / rowsPerPage) || 1;
        renderTable();
        document.getElementById('pageInfo').innerText = `${currentPage} / ${totalPages}`;
        document.getElementById('prevBtn').disabled = currentPage === 1;
        document.getElementById('nextBtn').disabled = currentPage === totalPages;
        document.getElementById('status-box').innerText = `결과: ${filteredRows.length.toLocaleString()}건`;
    }

    function renderTable() {
        const start = (currentPage - 1) * rowsPerPage;
        const pageData = filteredRows.slice(start, start + rowsPerPage);
        const body = document.getElementById('tableBody');
        body.innerHTML = pageData.map(row => `<tr>${row.map(cell => `<td>${cell || '-'}</td>`).join('')}</tr>`).join('');
    }

    function changePage(offset) {
        currentPage += offset;
        updateDisplay();
        document.querySelector('.table-wrapper').scrollTop = 0;
    }

    window.onload = fetchData;
</script>
</body>
</html>
