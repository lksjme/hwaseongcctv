<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>CCTV 관제 센터 - 통합 리스트 (Dark)</title>
    <link rel="icon" href="data:;base64,iVBORw0KGgo=">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        /* [테마 설정] 전체 블랙 & 다크그레이 톤 */
        :root { 
            --primary: #3498db; 
            --bg-main: #0f1216; /* 메인 배경 */
            --bg-sidebar: #1a1d23; /* 사이드바 배경 */
            --bg-card: #252a31; /* 카드/입력창 배경 */
            --text-main: #e0e6ed; /* 기본 글자색 */
            --text-muted: #94a3b8; /* 흐린 글자색 */
            --border: #334155; /* 테두리 */
            --accent: #f39c12; /* 강조색 (오렌지) */
            --row-hover: #2d3748; /* 테이블 호버 */
        }

        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Malgun Gothic', sans-serif; background: var(--bg-main); color: var(--text-main); display: flex; flex-direction: column; overflow: hidden; }
        
        /* 헤더 */
        header { height: 60px; background: #000; color: white; display: flex; align-items: center; justify-content: center; flex-shrink: 0; z-index: 1000; border-bottom: 1px solid var(--border); }
        header h1 { font-size: 19px; margin: 0; letter-spacing: 1px; }
        .home-btn { position: absolute; left: 15px; width: 38px; height: 38px; background: #222; border: 1px solid #444; border-radius: 8px; display: flex; align-items: center; justify-content: center; text-decoration: none; color: white; transition: 0.2s; }
        .home-btn:hover { background: var(--primary); }

        .main-container { display: flex; flex: 1; overflow: hidden; position: relative; }

        /* 사이드바 */
        .sidebar { width: 300px; background: var(--bg-sidebar); padding: 20px; border-right: 1px solid var(--border); display: flex; flex-direction: column; gap: 15px; flex-shrink: 0; overflow-y: auto; box-sizing: border-box; }
        .sidebar.hidden { margin-left: -300px; }

        .toggle-btn {
            position: absolute; left: 300px; top: 50%; transform: translateY(-50%);
            width: 22px; height: 60px; background: var(--bg-sidebar); color: var(--text-main);
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; border-radius: 0 10px 10px 0; z-index: 1001; border: 1px solid var(--border); border-left: none; transition: 0.3s;
        }
        .sidebar.hidden + .toggle-btn { left: 0; }

        /* 입력창 & 버튼 */
        .search-group { display: flex; gap: 6px; }
        .search-input { flex: 1; padding: 12px; background: var(--bg-card); border: 1px solid var(--border); border-radius: 6px; color: white; font-size: 14px; outline: none; }
        .search-btn { padding: 0 15px; background: var(--primary); color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }

        /* 탭 버튼 */
        .filter-tabs { display: flex; gap: 5px; }
        .tab-btn { flex: 1; padding: 10px 0; border: 1px solid var(--border); background: #222; color: #aaa; border-radius: 6px; cursor: pointer; font-size: 13px; transition: 0.2s; }
        .tab-btn.active { background: var(--primary); color: white; border-color: var(--primary); }

        /* 지역별 현황 카드 */
        .stat-card { 
            background: var(--bg-card); border: 1px solid var(--border); padding: 12px; border-radius: 8px; 
            cursor: pointer; transition: 0.2s; display: flex; justify-content: space-between; font-size: 14px;
        }
        .stat-card:hover { border-color: var(--primary); }
        .stat-card.active { background: #1e3a8a; border-color: var(--primary); }
        .stat-card .count { font-weight: bold; color: var(--accent); }

        /* 권역별 합계표 (좌측 하단) */
        .regional-status-table { width: 100%; border-collapse: collapse; font-size: 13px; margin-top: 10px; background: #111; border: 1px solid var(--border); }
        .regional-status-table th { background: #222; padding: 8px; border: 1px solid var(--border); color: var(--text-muted); }
        .regional-status-table td { padding: 8px; border: 1px solid var(--border); text-align: center; }
        .regional-status-table .label-col { text-align: left; background: #1a1a1a; font-weight: bold; padding-left: 10px; color: #ccc; }

        /* 메인 콘텐츠(테이블) 영역 */
        .content-area { flex: 1; display: flex; flex-direction: column; background: var(--bg-main); overflow: hidden; }
        .table-wrapper { flex: 1; overflow: auto; border: 1px solid var(--border); margin: 10px; border-radius: 8px; background: #161a1f; }
        
        table { border-collapse: collapse; font-size: 13px; white-space: nowrap; width: max-content; }
        thead { position: sticky; top: 0; background: #1f2937; z-index: 20; }
        th { padding: 12px 15px; border: 1px solid var(--border); color: #cbd5e1; font-weight: 600; text-align: left; }
        td { padding: 10px 15px; border: 1px solid #2d3748; color: #cbd5e1; }
        tr:nth-child(even) { background: #1a1f26; }
        tr:hover { background: var(--row-hover); }

        /* 테이블 내 드롭다운 필터 */
        .filter-select { display: block; width: 100%; margin-top: 5px; background: #0f172a; border: 1px solid #475569; color: #3498db; font-size: 11px; border-radius: 4px; padding: 2px; }

        /* 하단 페이지네이션 */
        .pagination-bar { height: 50px; border-top: 1px solid var(--border); display: flex; align-items: center; justify-content: center; gap: 20px; background: #000; }
        .page-btn { padding: 6px 16px; cursor: pointer; border: 1px solid #444; background: #222; color: white; border-radius: 6px; font-size: 13px; }
        .page-btn:disabled { opacity: 0.3; cursor: default; }

        #status-box { font-size: 12px; color: var(--text-muted); margin-top: auto; padding-top: 10px; border-top: 1px dashed #444; }

        /* 스크롤바 디자인 */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #0f1216; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #475569; }
    </style>
</head>
<body>

<header>
    <a href="index.html" class="home-btn">🏠</a>
    <h1>방범CCTV 통합 자산 리스트</h1>
</header>

<div class="main-container">
    <div class="sidebar" id="sidebar">
        <label style="font-weight:bold; font-size:14px; color:var(--primary);">🔍 검색 및 필터</label>
        <div class="search-group">
            <input type="text" id="searchInput" class="search-input" placeholder="검색어 입력..." onkeypress="if(event.keyCode==13) resetAndFilter()">
            <button class="search-btn" onclick="resetAndFilter()">검색</button>
        </div>

        <div class="filter-tabs">
            <button class="tab-btn active" onclick="filterByStatus('전체', this)">전체</button>
            <button class="tab-btn" onclick="filterByStatus('준공', this)">준공</button>
            <button class="tab-btn" onclick="filterByStatus('미준공', this)">미준공</button>
        </div>
        
        <hr style="width:100%; border:0; border-top:1px solid #333;">
        
        <label style="font-weight:bold; font-size:14px; color:var(--primary);">📍 지역별 현황</label>
        <div id="district-stats" style="display:flex; flex-direction:column; gap:8px;"></div>

        <div style="margin-top: 10px;">
            <label style="font-weight:bold; font-size:13px; color:var(--accent);">📊 동/서 구분</label>
            <table class="regional-status-table">
                <thead>
                    <tr><th style="width:40%">항목</th><th>동부</th><th>서부</th></tr>
                </thead>
                <tbody id="regionalTableBody">
                    <tr><td colspan="3">데이터 분석 중...</td></tr>
                </tbody>
            </table>
        </div>

        <div id="status-box">데이터 로딩 중...</div>
    </div>

    <div class="toggle-btn" id="toggleBtn" onclick="toggleSidebar()">◀</div>

    <div class="content-area">
        <div class="table-wrapper">
            <table id="dataTable">
                <thead id="tableHead"></thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
        
        <div class="pagination-bar">
            <button class="page-btn" id="prevBtn" onclick="changePage(-1)">이전</button>
            <span id="pageInfo" style="font-size:14px; font-weight:bold; color:var(--primary);">1 / 1</span>
            <button class="page-btn" id="nextBtn" onclick="changePage(1)">다음</button>
        </div>
    </div>
</div>

<script>
    const SHEET_ID = '1_mVh5xroGTVhL7j8IVxnRufmApBFLAnGYIoqDg5MvAw';
    const GID = '1075339251';
    
    let headers = [];
    let allRows = [];
    let filteredRows = [];
    let selectedDistrict = '전체';
    let selectedStatus = '전체';
    let currentPage = 1;
    const rowsPerPage = 500; // 다크모드 성능을 위해 페이지당 행 조절

    function toggleSidebar() {
        const sidebar = document.getElementById('sidebar');
        const btn = document.getElementById('toggleBtn');
        sidebar.classList.toggle('hidden');
        btn.innerText = sidebar.classList.contains('hidden') ? "▶" : "◀";
    }

    async function fetchData() {
        // 캐시 방지 파라미터 추가
        const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&gid=${GID}&t=${new Date().getTime()}`;
        try {
            const res = await fetch(url);
            const text = await res.text();
            const data = parseCSV(text);
            headers = data[0];
            allRows = data.slice(1);
            
            createFilterHeader();
            applyFilters(); 
            
            const now = new Date();
            document.getElementById('status-box').innerText = `동기화 완료: ${now.getHours()}:${now.getMinutes()} (총 ${allRows.length}건)`;
        } catch (e) { 
            console.error(e);
            document.getElementById('status-box').innerText = "❌ 시트 연결 실패";
        }
    }

    function parseCSV(csv) {
        return csv.split('\n').filter(r => r.trim() !== "").map(row => 
            row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(cell => cell.replace(/^"(.*)"$/, '$1').trim())
        );
    }

    function updateRegionalTable(rowsToSum) {
        const result = {
            east: { siteCount: 0, totalCam: 0, aiCamCount: 0 },
            west: { siteCount: 0, totalCam: 0, aiCamCount: 0 }
        };

        const idxB = 1;  const idxE = 5;  const idxV = 21; 

        rowsToSum.forEach(row => {
            const regionStr = String(row[idxE] || "").replace(/\s/g, "");
            const rawB = String(row[idxB] || "").trim();
            const bNumbers = rawB.replace(/[^0-9]/g, ""); 
            const valV = String(row[idxV] || "").trim();
            const isAICamera = (valV === "0"); // V열이 '0'이면 AI카메라가 있는 개소

            let target = null;
            if (regionStr.includes("동부")) target = result.east;
            else if (regionStr.includes("서부")) target = result.west;

            if (target) {
                if (bNumbers.length > 0) {
                    target.siteCount++;
                    target.totalCam += parseInt(bNumbers) || 0;
                }
                if (isAICamera) target.aiCamCount++;
            }
        });

        document.getElementById('regionalTableBody').innerHTML = `
            <tr>
                <td class="label-col">개소 수</td>
                <td style="font-weight:bold;">${result.east.siteCount.toLocaleString()}</td>
                <td style="font-weight:bold;">${result.west.siteCount.toLocaleString()}</td>
            </tr>
            <tr>
                <td class="label-col">카메라 수</td>
                <td style="color:var(--primary); font-weight:bold;">${result.east.totalCam.toLocaleString()}</td>
                <td style="color:var(--primary); font-weight:bold;">${result.west.totalCam.toLocaleString()}</td>
            </tr>
            <tr>
                <td class="label-col">AI카메라</td>
                <td style="color:var(--accent); font-weight:bold;">${result.east.aiCamCount.toLocaleString()}</td>
                <td style="color:var(--accent); font-weight:bold;">${result.west.aiCamCount.toLocaleString()}</td>
            </tr>
        `;
    }

    function updateDistrictStats(currentBaseData) {
        const idxDistrict = 6; 
        const stats = { '전체': currentBaseData.length };
        currentBaseData.forEach(row => {
            const d = row[idxDistrict] || "미분류";
            stats[d] = (stats[d] || 0) + 1;
        });
        const container = document.getElementById('district-stats');
        container.innerHTML = Object.keys(stats).map(name => `
            <div class="stat-card ${selectedDistrict === name ? 'active' : ''}" onclick="filterByDistrict('${name}')">
                <span>${name}</span><span class="count">${stats[name].toLocaleString()}</span>
            </div>
        `).join('');
    }

    function filterByStatus(status, btn) {
        selectedStatus = status;
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        resetAndFilter();
    }

    function filterByDistrict(name) {
        selectedDistrict = name;
        resetAndFilter();
    }

    function createFilterHeader() {
        const head = document.getElementById('tableHead');
        let html = "<tr>";
        headers.forEach((h, idx) => {
            const uniqueValues = [...new Set(allRows.map(row => row[idx]))].filter(v => v && v !== "-").sort();
            html += `<th>${h}<select class="filter-select" data-index="${idx}" onchange="resetAndFilter()"><option value="">전체</option>${uniqueValues.map(v => `<option value="${v}">${v}</option>`).join('')}</select></th>`;
        });
        head.innerHTML = html + "</tr>";
    }

    function resetAndFilter() {
        currentPage = 1;
        applyFilters();
    }

    function applyFilters() {
        const searchTerm = document.getElementById('searchInput').value.toLowerCase();
        const selects = document.querySelectorAll('.filter-select');
        const activeFilters = Array.from(selects).map(s => ({ index: s.dataset.index, value: s.value })).filter(f => f.value !== "");
        
        const idxStatus = 2; 
        const idxDistrict = 6; 

        const baseFiltered = allRows.filter(row => {
            const matchesStatus = (selectedStatus === '전체') || (row[idxStatus] === selectedStatus);
            const matchesSearch = row.some(cell => String(cell).toLowerCase().includes(searchTerm));
            const matchesFilters = activeFilters.every(f => row[f.index] === f.value);
            return matchesStatus && matchesSearch && matchesFilters;
        });

        updateDistrictStats(baseFiltered);

        filteredRows = baseFiltered.filter(row => {
            return (selectedDistrict === '전체') || (row[idxDistrict] === selectedDistrict);
        });

        updateRegionalTable(filteredRows);
        updateDisplay();
    }

    function updateDisplay() {
        const totalPages = Math.ceil(filteredRows.length / rowsPerPage) || 1;
        renderTable();
        document.getElementById('pageInfo').innerText = `${currentPage} / ${totalPages}`;
        document.getElementById('prevBtn').disabled = currentPage === 1;
        document.getElementById('nextBtn').disabled = currentPage === totalPages;
    }

    function renderTable() {
        const start = (currentPage - 1) * rowsPerPage;
        const pageData = filteredRows.slice(start, start + rowsPerPage);
        const body = document.getElementById('tableBody');
        body.innerHTML = pageData.map(row => `<tr>${row.map(cell => `<td>${cell || '-'}</td>`).join('')}</tr>`).join('');
    }

    function changePage(offset) {
        currentPage += offset;
        updateDisplay();
        document.querySelector('.table-wrapper').scrollTop = 0;
    }

    window.onload = fetchData;
</script>
</body>
</html>
