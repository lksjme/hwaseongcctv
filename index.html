    <style>
        :root { 
            --primary: #0a0e17; --bg: #050507; --card: #111114; 
            --accent: #0099ff; --border: #222226; --text: #d1d5db; --sub-text: #666;
            --success: #1db954; --warning: #f1c40f; --danger: #e74c3c;
        }
        body { margin: 0; padding: 0; font-family: 'Malgun Gothic', sans-serif; background: var(--bg); display: flex; flex-direction: column; height: 100vh; overflow: hidden; color: var(--text); }
        
        /* 헤더 & 로고 */
        header { background: #000; color: white; padding: 0 25px; display: flex; justify-content: space-between; align-items: center; height: 55px; z-index: 1001; flex-shrink: 0; border-bottom: 1px solid var(--border); box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .logo { font-size: 18px; font-weight: bold; letter-spacing: 1px; color: #fff; text-transform: uppercase; }
        .logo span { color: var(--accent); }
        
        /* 로그인 & 회원가입 */
        .login-area { display: flex; align-items: center; gap: 8px; }
        .login-area input { padding: 7px; border-radius: 4px; border: 1px solid #333; background: #1a1a1d; color: #fff; width: 90px; font-size: 12px; transition: 0.3s; }
        .login-area input:focus { border-color: var(--accent); outline: none; }
        .header-btn { padding: 6px 16px; background: var(--accent); border: none; color: white; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 11px; transition: 0.2s; text-transform: uppercase; }
        .header-btn:hover { background: #007acc; transform: translateY(-1px); }
        .signup-link { color: #888; font-size: 11px; text-decoration: none; transition: 0.3s; cursor: pointer; }
        .signup-link:hover { color: #fff; text-decoration: underline; }

        /* [추가] 관리자 전용 버튼 스타일 & 애니메이션 */
        .admin-btn { background: none; border: 1px solid var(--warning); color: var(--warning); padding: 5px 12px; border-radius: 20px; font-size: 11px; font-weight: bold; cursor: pointer; transition: 0.3s; animation: pulse 2s infinite; }
        .admin-btn:hover { background: var(--warning); color: #000; animation: none; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(241, 196, 15, 0.4); } 70% { box-shadow: 0 0 0 10px rgba(241, 196, 15, 0); } 100% { box-shadow: 0 0 0 0 rgba(241, 196, 15, 0); } }

        /* 네비게이션 */
        .nav-bar { background: #0d0d10; border-bottom: 1px solid var(--border); padding: 10px; display: flex; justify-content: center; gap: 12px; z-index: 1000; flex-shrink: 0; }
        .nav-btn { width: 170px; padding: 10px; text-decoration: none; color: #777; border: 1px solid #333; border-radius: 6px; text-align: center; font-weight: bold; font-size: 12px; transition: 0.3s; opacity: 0.5; pointer-events: none; }
        .nav-btn.enabled { opacity: 1; pointer-events: auto; border-color: #444; color: #ddd; }
        .nav-btn.enabled:hover { border-color: var(--accent); color: var(--accent); background: rgba(0,153,255,0.05); }

        /* 대시보드 컨테이너 & 그리드 */
        .dashboard-container { flex: 1; padding: 20px; overflow-y: auto; }
        
        /* [수정] 좌측 넓게(3fr), 우측 좁게(1fr) 비율 조정 */
        .dashboard-grid { 
            display: grid; grid-template-columns: 3fr 1fr; grid-template-rows: 1.1fr 1fr 1fr 1.1fr; gap: 20px; 
            height: 100%; min-height: 900px; transition: filter 0.8s ease, transform 0.6s ease; 
            filter: blur(20px); pointer-events: none; transform: translateY(20px); opacity: 0; 
        }
        
        /* [추가] 초기 등장 애니메이션 클래스 */
        .dashboard-grid.unlocked { filter: blur(0); pointer-events: auto; transform: translateY(0); opacity: 1; }

        .card { background: var(--card); border-radius: 12px; padding: 18px; box-shadow: 0 10px 30px rgba(0,0,0,0.6); display: flex; flex-direction: column; position: relative; border: 1px solid var(--border); overflow: hidden; transition: 0.3s; }
        .card:hover { border-color: #333; transform: translateY(-3px); box-shadow: 0 15px 40px rgba(0,0,0,0.7); }
        .card-title { font-size: 14px; font-weight: 700; color: #fff; margin-bottom: 15px; border-left: 4px solid var(--accent); padding-left: 10px; position: relative; z-index: 10; text-transform: uppercase; letter-spacing: 0.5px; }
        
        /* 지도 배경 & 어두운 레이어 */
        .card-main { grid-column: 1 / 2; grid-row: 1 / 4; background-image: url('image_d2fdc0.jpg'); background-repeat: no-repeat; background-position: center; background-size: 100% 100%; padding: 0; position: relative; border-color: #1a1a1d; }
        .map-overlay-dark { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0, 0, 0, 0.6); z-index: 1; pointer-events: none; }
        
        /* 지도 제목 상자 (음영 최적화) */
        .card-main .card-title-box { position: absolute; top: 20px; left: 20px; background: rgba(0, 0, 0, 0.85); padding: 12px 20px; border-radius: 8px; box-shadow: 0 5px 20px rgba(0,0,0,0.7); border-left: 5px solid var(--accent); z-index: 20; }
        .card-title-text { font-size: 15px; font-weight: 700; color: #fff; text-transform: uppercase; }

        /* 수동 배치 태그 스타일 */
        .map-tag {
    position: absolute;
    cursor: pointer;
    z-index: 10;
}
.map-tooltip {
    position: absolute;
    bottom: 140%; /* 태그 위쪽으로 배치 */
    left: 50%;
    transform: translateX(-50%) translateY(10px); /* 아래에서 위로 올라오는 시작점 */
    background: rgba(15, 15, 20, 0.95); /* 다크 테마 배경 */
    color: #fff;
    padding: 12px 16px;
    border-radius: 8px;
    font-size: 12px;
    line-height: 1.6;
    white-space: nowrap;
    opacity: 0;
    visibility: hidden;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); /* 차트 같은 부드러운 움직임 */
    box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
    border: 1px solid rgba(0, 204, 255, 0.3);
    z-index: 100;
}

/* 툴팁 하단 화살표 */
.map-tooltip::after {
    content: '';
    position: absolute;
    top: 100%;
    left: 50%;
    transform: translateX(-50%);
    border-width: 6px;
    border-style: solid;
    border-color: rgba(15, 15, 20, 0.95) transparent transparent transparent;
}

/* 마우스 올렸을 때 애니메이션 실행 */
.map-tag:hover .map-tooltip {
    opacity: 1;
    visibility: visible;
    transform: translateX(-50%) translateY(0); /* 제자리로 올라옴 */
}

/* 숫자 태그 자체도 살짝 커지는 효과 */
.map-tag:hover .tag-count {
    transform: scale(1.1);
    box-shadow: 0 0 15px var(--accent);
    transition: 0.3s;
}
        .tag-count { 
            background: rgba(10, 10, 12, 0.95); padding: 6px 16px; border-radius: 6px; 
            border: 2px solid; font-size: 20px; font-weight: 900; color: #fff;
            box-shadow: 0 6px 18px rgba(0,0,0,0.8);
        }
        .manse { border-color: #1db954; color: #1db954; } 
        .hyo { border-color: #7f8c8d; color: #7f8c8d; } 
        .byeong { border-color: #0099ff; color: #0099ff; } 
        .dongtan { border-color: #f1c40f; color: #f1c40f; }

        /* 준공여부 표 다크 스타일 */
        .status-table { width: 100%; border-collapse: collapse; font-size: 12px; margin-top: 5px; color: #bbb; }
        .status-table th { background: #1a1a1d; padding: 12px; text-align: left; color: #777; border-bottom: 2px solid #333; text-transform: uppercase; letter-spacing: 0.5px; }
        .status-table td { padding: 14px 12px; border-bottom: 1px solid #252529; font-weight: 600; }
        .badge { padding: 4px 8px; border-radius: 4px; color: white; font-size: 11px; font-weight: bold; text-transform: uppercase; }
        
        .chart-box { flex: 1; min-height: 0; width: 100%; }

        /* 모달 공통 스타일 */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 2000; align-items: center; justify-content: center; }
        .modal-content { 
            background: #1a1a1d; border: 1px solid #333; padding: 30px; border-radius: 12px; width: 380px; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.9); position: relative; animation: modalFade 0.3s ease-out;
        }
        @keyframes modalFade { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
        
        .modal-header { font-size: 18px; font-weight: bold; margin-bottom: 20px; color: var(--accent); border-bottom: 1px solid #333; padding-bottom: 10px; }
        .modal-body input { width: 100%; padding: 12px; margin-bottom: 12px; border-radius: 4px; border: 1px solid #333; background: #0d0d0f; color: #fff; box-sizing: border-box; }
        .close-btn { position: absolute; top: 15px; right: 20px; color: #777; cursor: pointer; font-size: 24px; }
        .close-btn:hover { color: #fff; }

        /* 회원관리 테이블 전용 */
        .admin-table { width: 100%; border-collapse: collapse; font-size: 13px; color: #ccc; }
        .admin-table th { border-bottom: 2px solid #444; padding: 10px; text-align: left; color: #888; }
        .admin-table td { padding: 12px 10px; border-bottom: 1px solid #222; }
        .approve-btn { background: var(--success); border: none; color: #fff; padding: 5px 12px; border-radius: 4px; cursor: pointer; font-weight: bold; }
   /* 모바일 및 태블릿 최적화 (1080px 이하) */
@media screen and (max-width: 1080px) {
    body {
        overflow-y: auto; /* 전체 페이지 스크롤 허용 */
        height: auto;
    }

    /* 1. 대시보드 그리드를 세로 1줄 레이아웃으로 변경 */
    .dashboard-grid {
        display: flex !important;
        flex-direction: column !important;
        height: auto !important;
        min-height: min-content !important;
        gap: 15px !important;
        padding-bottom: 50px; /* 하단 여백 */
    }

    /* 2. 지도 카드 (항상 맨 위) */
    .card-main {
        width: 100% !important;
        height: 400px !important; /* 모바일 지도 높이 고정 */
        order: 1; /* 순서 보장 */
    }

    /* 3. 나머지 차트 카드들 */
    .card {
        width: 100% !important;
        height: 350px !important; /* 차트 가독성을 위한 높이 */
        grid-column: auto !important; /* 그리드 설정 해제 */
        grid-row: auto !important;
        order: 2;
    }

    /* 4. 맨 아래에 있던 넓은 차트도 동일하게 조정 */
    .card[style*="grid-column: 1/3"] {
        grid-column: auto !important;
        grid-row: auto !important;
        height: 400px !important;
        order: 3;
    }

    /* 5. 지도 위 태그 크기 및 위치 미세 조정 */
    .tag-count {
        font-size: 14px !important;
        padding: 4px 10px !important;
    }
    
    /* 6. 헤더 및 네비게이션 모바일 대응 */
    header {
        height: auto;
        flex-direction: column;
        padding: 15px;
        gap: 10px;
    }
    .nav-bar {
        flex-wrap: wrap;
    }
    .nav-btn {
        width: calc(50% - 10px); /* 버튼 2개를 가로로 꽉 채움 */
        font-size: 11px;
    }
}
/* 내비게이션 바: 가로로 나란히 배치 */
/* 내비게이션 바: 가로 배치 유지 */
.nav-bar {

    margin: 25px 0;
}

    /* 배경: 아주 어두운 네이비/블랙톤에 투명도 부여 */
    background: rgba(15, 15, 20, 0.85); 
    /* 테두리: 배경보다 살짝 밝은 선으로 입체감 부여 */
    border: 1px solid rgba(255, 255, 255, 0.08);
    border-radius: 10px;
    
    color: #aaa;          /* 기본 글자색은 차분하게 */

    font-weight: 600;
    font-size: 14px;
    letter-spacing: -0.5px;
    transition: all 0.3s ease;
    box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4); /* 깊이감 있는 그림자 */
}

/* 활성화 및 호버 상태: 배경과 어울리는 네온 효과 */
.nav-btn.enabled:hover {
    transform: translateY(-3px);
    background: rgba(30, 30, 40, 0.9); /* 호버 시에만 살짝 밝아짐 */

}

/* 아이콘 박스 */
.nav-icon {

}

.icon-svg {

    stroke-linejoin: round;
    transition: 0.3s;
}

/* 호버 시 아이콘도 같이 밝아지게 */
.nav-btn:hover .icon-svg {
    filter: drop-shadow(0 0 5px rgba(255, 255, 255, 0.3));
}
/* 전체 자산 박스 호버 시 툴팁 표시 로직 */
.total-status-wrapper:hover #totalTooltip {

/* 박스 자체에도 약간의 반응 추가 (선택사항) */
.total-status-wrapper:hover {
    border-color: var(--accent) !important;
    background: rgba(20, 20, 25, 0.95) !important;
}

    Chart.register(ChartDataLabels);

    window.onload = function() {
        if (localStorage.getItem('isLoggedIn') === 'true') { 
            applyLoginUI(localStorage.getItem('userRole'), localStorage.getItem('userName')); 
        } else {
            // [추가] 초기 등장 애니메이션 트리거 (비로그인 시에도 애니메이션 적용)
            setTimeout(() => document.getElementById('dashboard').classList.add('unlocked'), 100);
        }
    };

    function applyLoginUI(role, name) {
        document.getElementById('loginArea').style.display = 'none';
        document.getElementById('userInfo').style.display = 'flex';
        
        // [수정] 애니메이션 트리거
        const dashboard = document.getElementById('dashboard');
        dashboard.classList.add('unlocked');
        
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.add('enabled'));
        
        // [추가] 관리자 전용 버튼 표시
        if(role === "admin") document.getElementById('adminBtn').style.display = 'block';
        
        document.getElementById('welcomeMsg').innerText = name + "님 접속 중";
        loadChartData();
    }
async function loadChartData() {
    const res = await fetch(DATA_URL);
    const text = await res.text();
    const rows = text.split('\n').slice(1).map(row => row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(c => c.replace(/^"(.*)"$/, '$1').trim()));
    const validRows = rows.filter(row => row[1] && row[1].trim() !== '');

    const stats = { dist: {}, status: {}, net: {}, vendor: {}, purpose: {} };
    let totalCompleted = 0; 
    let grandStats = { ptz: 0, fix: 0, fish: 0 }; 

    // --- [순서 변경] 1. 데이터를 먼저 모두 집계합니다 ---
    validRows.forEach(row => {
        // 인덱스: h(6), c(2), aa(22), v(17), af(24), cameraType(10)
        const [h, c, aa, v, af, cameraType] = [row[6], row[2], row[22], row[17], row[24], row[10]];
        
        if(c === '준공' && h) {
            // 구별 데이터 초기화
            if (!stats.dist[h]) {
                stats.dist[h] = { total: 0, ptz: 0, fix: 0, fish: 0 };
            }
            
            stats.dist[h].total++;
            totalCompleted++;

            // [수정] 전체 합계(grandStats)와 구별 합계(stats.dist)를 동시에 계산
            if (cameraType) {
                if (cameraType.includes('회전')) {
                    stats.dist[h].ptz++;
                    grandStats.ptz++;
                } else if (cameraType.includes('고정')) {
                    stats.dist[h].fix++;
                    grandStats.fix++;
                } else if (cameraType.includes('어안')) {
                    stats.dist[h].fish++;
                    grandStats.fish++;
                }
            }
        }
        
        if(c) stats.status[c] = (stats.status[c]||0)+1;
        if(aa) stats.net[aa] = (stats.net[aa]||0)+1;
        if(v) stats.vendor[v] = (stats.vendor[v]||0)+1;
        if(af) stats.purpose[af] = (stats.purpose[af]||0)+1;
    });

    // --- [순서 변경] 2. 데이터 집계가 끝난 후 화면을 업데이트합니다 ---
    
    // 메인 총계 업데이트
    const elTotal = document.getElementById('totalCnt');
    if(elTotal) elTotal.innerText = totalCompleted.toLocaleString();

    // 메인 툴팁 상세 숫자 업데이트
    if(document.getElementById('grandPtz')) document.getElementById('grandPtz').innerText = grandStats.ptz.toLocaleString() + "대";
    if(document.getElementById('grandFix')) document.getElementById('grandFix').innerText = grandStats.fix.toLocaleString() + "대";
    if(document.getElementById('grandFish')) document.getElementById('grandFish').innerText = grandStats.fish.toLocaleString() + "대";

    // 3. 지도 업데이트 (이 코드가 아래에 있어야 지도가 그려집니다)
    const mapOverlay = document.getElementById('mapOverlay');
    if(mapOverlay) {
        mapOverlay.innerHTML = GU_CONFIG.map(g => {
            const d = stats.dist[g.name] || { total: 0, ptz: 0, fix: 0, fish: 0 };
            return `
                <div class="map-tag" style="top:${g.top}; left:${g.left};">
                    <div class="map-tooltip">
                        <strong style="color:var(--accent);">${g.name} 상세</strong><br>
                        회전: ${d.ptz} / 고정: ${d.fix} / 어안: ${d.fish}
                    </div>
                    <div class="tag-count ${g.class}">${d.total.toLocaleString()}</div>
                </div>`;
        }).join('');
    }

    // 4. 차트 렌더링 코드들 (기존 유지)
    // renderPieChart('netChart', stats.net, ...); 등등


        // 지도 태그 업데이트 (준공 기준 수량)
        document.getElementById('mapOverlay').innerHTML = GU_CONFIG.map(g => {
    // stats.dist[g.name]이 없으면(undefined) 0으로 채워진 객체를 대신 사용함
    const d = stats.dist[g.name] || { total: 0, ptz: 0, fix: 0, fish: 0 };
    
    // d.total이 undefined일 경우를 대비해 한번 더 0으로 체크
    const totalDisplay = (d.total || 0).toLocaleString();

    return `
        <div class="map-tag" style="top:${g.top}; left:${g.left};">
            <div class="map-tooltip">
                <strong style="color:var(--accent); display:block; margin-bottom:5px; border-bottom:1px solid #333; padding-bottom:3px;">${g.name} 상세</strong>
                <div style="display:flex; justify-content:space-between; gap:15px;">
                    <span>회전형</span> <span style="color:#ffbb33">${(d.ptz || 0).toLocaleString()}대</span>
                </div>
                <div style="display:flex; justify-content:space-between; gap:15px;">
                    <span>고정형</span> <span style="color:#00ccff">${(d.fix || 0).toLocaleString()}대</span>
                </div>
                <div style="display:flex; justify-content:space-between; gap:15px;">
                    <span>어안형</span> <span style="color:#2ecc71">${(d.fish || 0).toLocaleString()}대</span>
                </div>
            </div>
            <div class="tag-count ${g.class}">${totalDisplay}</div>
        </div>`;
}).join('');
            
        document.getElementById('totalCnt').innerText = totalCompleted.toLocaleString();

        // 준공여부 표
        const statusBody = document.getElementById('statusTableBody');
        statusBody.innerHTML = '';
        Object.entries(stats.status).forEach(([k, v]) => {
            const ratio = ((v / validRows.length) * 100).toFixed(1);
            statusBody.innerHTML += `<tr><td><span class="badge" style="background:${k==='준공'?'#1db954':'#c0392b'}">${k}</span></td><td>${v.toLocaleString()}</td><td>${ratio}%</td></tr>`;
        });

        // [수정] 다크 테마용 고급 컬러 (그라데이션 효과용)
        const darkBlue = createRadialGradient('#00ccff', '#007acc');
        const darkOrange = createRadialGradient('#ffbb33', '#e67e22');
        const darkGreen = createRadialGradient('#2ecc71', '#27ae60');
        const darkYellow = createRadialGradient('#f1c40f', '#d4ac0d');
        const darkPurple = createRadialGradient('#9b59b6', '#8e44ad');

        const pieColors = [darkBlue, darkOrange, darkGreen, darkYellow, darkPurple];

        // 원형 차트 (통신사, 비상벨 도넛형) - 레이블 원 안으로
        renderPieChart('netChart', stats.net, pieColors, true);
        renderPieChart('vendorChart', stats.vendor, [darkPurple, darkGreen, '#34495e', '#e74c3c'], true);

        // 설치목적별 가로막대 - 레이블 우측 배치 (흰색 폰트)
        renderBarChart('purposeChart', stats.purpose, darkBlue);
    }

    // 그라데이션 생성 함수 (프리미엄 다크 느낌)
    function createRadialGradient(colorStart, colorEnd) {
        const ctx = document.createElement('canvas').getContext('2d');
        const gradient = ctx.createRadialGradient(100, 100, 10, 100, 100, 100);
        gradient.addColorStop(0, colorStart);
        gradient.addColorStop(1, colorEnd);
        return gradient;
    }

    function renderPieChart(id, dataObj, colors, isDoughnut = false) {
        const sorted = Object.entries(dataObj).sort((a,b)=>b[1]-a[1]).slice(0, 5);
        new Chart(document.getElementById(id), {
            type: isDoughnut ? 'doughnut' : 'pie',
            data: { labels: sorted.map(x=>x[0]), datasets: [{ data: sorted.map(x=>x[1]), backgroundColor: colors, borderColor: '#111114', borderWidth: 2, hoverOffset: 15 }] },
            options: {
                responsive: true, maintainAspectRatio: false,
                layout: { padding: 10 },
                // [추가] 차트 애니메이션 설정
                animation: { animateRotate: true, animateScale: true, duration: 1500, easing: 'easeOutElastic' },
                plugins: {
                    legend: { position: 'right', labels: { color: '#888', boxWidth: 12, padding: 15, font: { size: 10, weight: 'nomal' } } },
                    // [수정] 레이블 원 안으로 배치 및 스타일
                    datalabels: { 
                        color: '#fff', font: { size: 14, weight: '500' },
                        anchor: 'center', align: 'center', // 중앙 배치
                        formatter: (val, ctx) => {
                            const total = ctx.dataset.data.reduce((a, b) => a + b, 0);
                            return `${((val / total) * 100).toFixed(0)}%`; // 백분율 표시
                        },
                        // 작은 데이터는 레이블 숨김 (잘림 방지)
                        display: (ctx) => {
                            const val = ctx.dataset.data[ctx.dataIndex];
                            const total = ctx.dataset.data.reduce((a, b) => a + b, 0);
                            return (val / total) > 0.05; // 5% 미만 숨김
                        }
                    }
                }
            }
        });
    }

    function renderBarChart(id, dataObj, color) {
        const sorted = Object.entries(dataObj).sort((a,b)=>b[1]-a[1]).slice(0, 10);
        new Chart(document.getElementById(id), {
            type: 'bar',
            data: { labels: sorted.map(x=>x[0]), datasets: [{ data: sorted.map(x=>x[1]), backgroundColor: color, borderRadius: 5, borderWidth: 0, hoverBackgroundColor: '#00ccff' }] },
            options: {
                indexAxis: 'y',
                responsive: true, maintainAspectRatio: false,
                layout: { padding: { right: 50, top: 10, bottom: 10 } },
                // [추가] 차트 애니메이션 설정
                animation: { duration: 1500, easing: 'easeOutQuart' },
                plugins: {
                    legend: { display: false },
                    datalabels: { anchor: 'end', align: 'right', color: '#eee', font: { size: 13, weight: 'nomal' }, formatter: (v) => v.toLocaleString() }
                },
                scales: { 
                    x: { ticks: { color: '#666', font:{size:11} }, grid: { color: '#222', drawBorder: false } },
                    y: { ticks: { color: '#aaa', font:{size:11, weight:'nomal'} }, grid: { display: false } }
                }
            }
        });
    }

    function handleLogin() {
        const id = document.getElementById('userId').value;
        const pw = document.getElementById('userPw').value;
        fetch(`${SCRIPT_URL}?action=login&id=${id}&pw=${pw}`).then(res => res.text()).then(result => {
            if(result === "admin" || result === "success") {
                localStorage.setItem('isLoggedIn', 'true'); localStorage.setItem('userRole', result); localStorage.setItem('userName', id);
                applyLoginUI(result, id);
            } else { alert("로그인 정보가 올바르지 않습니다."); }
        });
    }
    function handleLogout() { localStorage.clear(); location.reload(); }

    // 모달 열기/닫기
    function openModal(id) { document.getElementById(id).style.display = 'flex'; }
    function closeModal(id) { document.getElementById(id).style.display = 'none'; }

    // 회원가입 신청 전송
    async function handleSignup() {
        const id = document.getElementById('regId').value;
        const name = document.getElementById('regName').value;
        const pw = document.getElementById('regPw').value;
        const pwChk = document.getElementById('regPwCheck').value;

        if(!id || !name || !pw) return alert("모든 항목을 입력해주세요.");
        if(pw !== pwChk) return alert("비밀번호가 일치하지 않습니다.");

        try {
            const res = await fetch(`${SCRIPT_URL}?action=signup&id=${encodeURIComponent(id)}&name=${encodeURIComponent(name)}&pw=${encodeURIComponent(pw)}`);
            const result = await res.text();
            alert(result); 
            closeModal('signupModal');
        } catch(e) { alert("통신 중 오류가 발생했습니다."); }
    }

    // 관리자 회원 목록 호출
let currentPage = 1;
const rowsPerPage = 5; // 한 페이지에 보여줄 회원 수
let allUsers = [];     // 전체 사용자 데이터를 담을 변수

// 1. 관리자 모달 열기 및 데이터 로드
async function openAdminModal() {
    openModal('adminModal');
    const body = document.getElementById('adminTableBody');
    body.innerHTML = '<tr><td colspan="4" style="text-align:center; padding:20px;">데이터를 불러오는 중...</td></tr>';

    try {
        const response = await fetch(`${SCRIPT_URL}?action=getUserList&_=${new Date().getTime()}`);
        allUsers = await response.json(); // 전체 데이터 저장
        
        currentPage = 1; // 열 때마다 1페이지부터
        renderAdminTable();
    } catch (e) {
        body.innerHTML = '<tr><td colspan="4" style="text-align:center; color:#e74c3c;">로드 실패</td></tr>';
    }
}

// 2. 테이블 렌더링 (페이징 포함)
function renderAdminTable() {
    const body = document.getElementById('adminTableBody');
    
    // 페이징 계산
    const startIndex = (currentPage - 1) * rowsPerPage;
    const endIndex = startIndex + rowsPerPage;
    const paginatedUsers = allUsers.slice(startIndex, endIndex);

    // 테이블 내용 생성
    body.innerHTML = paginatedUsers.map(u => {
        const isPending = u[3] === 'pending';
        return `
            <tr style="border-bottom: 1px solid #222;">
                <td style="padding:10px;">${u[0]}</td>
                <td style="padding:10px;">${u[2]}</td>
                <td style="padding:10px; color:${isPending ? '#f1c40f' : '#1db954'}; font-weight:bold;">
                    ${u[3]}
                </td>
                <td style="padding:10px;">
                    ${isPending ? `<button class="approve-btn" onclick="approveUser('${u[0]}')">승인</button>` : `<span style="color:#666; font-size:11px;">완료</span>`}
                </td>
            </tr>
        `;
    }).join('');

    // 페이징 버튼 추가
    const totalPages = Math.ceil(allUsers.length / rowsPerPage);
    body.innerHTML += `
        <tr>
            <td colspan="4" style="text-align:center; padding:15px; background:#111;">
                <button onclick="changePage(-1)" ${currentPage === 1 ? 'disabled' : ''} style="cursor:pointer;">이전</button>
                <span style="margin:0 15px; font-weight:bold; color:var(--accent);">${currentPage} / ${totalPages}</span>
                <button onclick="changePage(1)" ${currentPage === totalPages ? 'disabled' : ''} style="cursor:pointer;">다음</button>
            </td>
        </tr>
    `;
}

function changePage(direction) {
    currentPage += direction;
    renderAdminTable();
}

// 3. 회원 승인 실행 (상태값 'approved'로 전송)
async function approveUser(id) {
    if(!confirm(`${id} 사용자를 승인하시겠습니까?`)) return;
    
    const btn = event.target;
    btn.disabled = true; // 중복 클릭 방지

    try {
        // GAS의 액션 명칭에 맞춰 호출 (중요: action=approveUser)
        const url = `${SCRIPT_URL}?action=approveUser&id=${encodeURIComponent(id)}&t=${new Date().getTime()}`;
        
        const res = await fetch(url);
        const result = await res.text();
        
        if (result === "done") {
            alert("승인이 완료되었습니다.");
            openAdminModal(); // 목록 새로고침 및 페이징 유지
        } else {
            alert("승인 실패: " + result);
        }
    } catch(e) {
        console.error("CORS Error:", e);
        alert("통신 오류가 발생했습니다. GAS 배포 설정을 다시 확인하세요.");
    } finally {
        btn.disabled = false;
    }
}
</script>

<div id="signupModal" class="modal">
    <div class="modal-content">
        <span class="close-btn" onclick="closeModal('signupModal')">&times;</span>
        <div class="modal-header">가입 신청</div>
        <div class="modal-body">
            <input type="text" id="regId" placeholder="아이디">
            <input type="text" id="regName" placeholder="이름">
            <input type="password" id="regPw" placeholder="비밀번호">
            <input type="password" id="regPwCheck" placeholder="비밀번호 확인">
            <button class="header-btn" style="width:100%; padding:12px;" onclick="handleSignup()">가입 신청하기</button>
        </div>
    </div>
</div>

<div id="adminModal" class="modal">
    <div class="modal-content" style="width: 500px;">
        <span class="close-btn" onclick="closeModal('adminModal')">&times;</span>
        <div class="modal-header">신규 회원 승인 관리</div>
        <div class="modal-body" style="max-height: 400px; overflow-y: auto;">
            <table class="admin-table">
                <thead><tr><th>아이디</th><th>이름</th><th>상태</th><th>액션</th></tr></thead>
                <tbody id="adminTableBody">
                    <tr><td colspan="4" style="text-align:center; padding:20px; color:#666;">데이터를 불러오는 중...</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
</body>
